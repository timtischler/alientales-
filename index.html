<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bullethell</title>
    <style>
      html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
      body { display: flex; align-items: center; justify-content: center; }
      canvas { display: block; }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="settings" style="position: fixed; top: 8px; left: 8px; color: #aaa; font: 12px monospace;">
      <label>Movement:
        <select id="mode">
          <option value="digital">Digital (instant)</option>
          <option value="accelerated">Accelerated</option>
        </select>
      </label>
      <label style="margin-left: 8px;">Fight:
        <select id="fight-select"></select>
      </label>
    </div>
    <div id="victory" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; color: #7df9ff; font: bold 32px monospace; text-shadow: 0 0 8px #0ff; pointer-events: none;">
      VICTORY
    </div>
    <div id="fight-config" style="position: fixed; top: 8px; right: 8px; color: #aaa; font: 12px monospace; background: rgba(0, 0, 0, 0.45); padding: 6px 8px; border: 1px solid #333;"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
